[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 비동기 테스트 설정
asyncio_mode = auto

# 커버리지 기본 옵션 (pytest-cov)
addopts =
    --strict-markers
    --tb=short
    -v

markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks integration tests requiring iTerm2 running
    unit: marks pure unit tests
