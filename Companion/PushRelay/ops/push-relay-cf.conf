# Cloudflare-origin vhost for the self-hosted push relay:
#   CF edge (push.iterm2.com:443) -> this box :8443 -> node on localhost:8790.
#
# Sibling of companion-relay-cf.conf, sharing the SAME :8443 listener and the
# SAME Cloudflare-only firewall on :8443. Name-based (SNI) virtual hosting picks
# this vhost when the edge presents ServerName push.iterm2.com.
#
# NOTE: `Listen 8443` is declared by companion-relay-cf.conf (which sorts first
# in sites-enabled) — do NOT declare it again here (duplicate Listen is fatal).
# This vhost therefore depends on that file staying enabled.
#
# Unlike the companion relay this is plain request/response (no WebSocket), so
# there is no `upgrade=websocket` on the ProxyPass.

<VirtualHost *:8443>
	ServerName push.iterm2.com

	SSLEngine on
	# Reuse the companion relay's Cloudflare Origin cert: it is a *.iterm2.com
	# wildcard (verified: SAN DNS:*.iterm2.com, iterm2.com), so it already covers
	# push.iterm2.com — no new cert needed.
	SSLCertificateFile    /etc/ssl/cloudflare/companion-relay.pem
	SSLCertificateKeyFile /etc/ssl/cloudflare/companion-relay.key

	# Zero-PII: errors only, no access log (an access log would capture IPs).
	ErrorLog ${APACHE_LOG_DIR}/push-relay-cf-error.log

	# Behind Cloudflare: leave CF-Connecting-IP intact (do NOT strip it). The
	# push relay's optional /register limiter keys on it; the :8443 firewall
	# admits only Cloudflare, so it cannot be forged. Harmless when the limiter
	# is off (PUSH_REGISTER_LIMIT unset).
	ProxyPreserveHost Off
	ProxyPass        "/" "http://127.0.0.1:8790/"
	ProxyPassReverse "/" "http://127.0.0.1:8790/"
</VirtualHost>
